<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; background: #200; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial', sans-serif; }
        #canvas { position: absolute; top: 0; left: 0; }
        .container { position: relative; z-index: 1; text-align: center; background: rgba(50, 0, 0, 0.8); padding: 30px; border-radius: 15px; border: 2px solid #f00; box-shadow: 0 0 20px #f00; animation: fadeIn 2s ease-in-out; }
        h1 { color: #ff4d4d; text-shadow: 2px 2px 10px #f00; animation: glow 1.5s infinite alternate; }
        textarea { width: 300px; height: 150px; background: #1a0000; color: #fff; border: 1px solid #f00; padding: 10px; border-radius: 5px; outline: none; transition: transform 0.3s; }
        textarea:focus { transform: scale(1.05); border-color: #ff4d4d; }
        @keyframes glow { from { opacity: 0.8; } to { opacity: 1; transform: translateY(-5px); } }
        @keyframes fadeIn { from { opacity: 0; scale: 0.8; } to { opacity: 1; scale: 1; } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="container">
        <h1>Enter Your Note</h1>
        <textarea placeholder="Write here..."></textarea>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() { ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 100; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>

</script></body>
</html>
